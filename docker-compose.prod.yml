# Production overrides — run with:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
#
# Before deploying, update SERVER_IP below (or set it as a shell variable: export SERVER_IP=103.86.177.246)

services:

  backend:
    volumes: []           # no source mount in production — use the built image
    environment:
      - DJANGO_DEBUG=False
      - DJANGO_ALLOWED_HOSTS=${SERVER_IP:-103.86.177.246},localhost,sri-warehouse.hms.rest
      - CORS_ALLOWED_ORIGINS=https://sri-warehouse.hms.rest,https://sri-warehouse.hms.rest:8443
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             python manage.py setup_periodic_tasks &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 4 --timeout 120"
  frontend:
    volumes: []           # no source mount in production — use the built image
    environment:
      - NEXT_PUBLIC_GRAPHQL_URL=https://sri-warehouse.hms.rest/graphql/
      - NEXT_PUBLIC_FIREBASE_API_KEY=${NEXT_PUBLIC_FIREBASE_API_KEY:-}
      - NEXT_PUBLIC_FIREBASE_PROJECT_ID=${NEXT_PUBLIC_FIREBASE_PROJECT_ID:-}
      - NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=${NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID:-}
      - NEXT_PUBLIC_FIREBASE_APP_ID=${NEXT_PUBLIC_FIREBASE_APP_ID:-}
      - NEXT_PUBLIC_FIREBASE_VAPID_KEY=${NEXT_PUBLIC_FIREBASE_VAPID_KEY:-}
    command: sh -c "npm run build && npm run start"

  celery:
    volumes: []

  celery-beat:
    volumes: []

  nginx:
    image: nginx:1.27-alpine
    container_name: warehouse_nginx
    restart: unless-stopped
    depends_on:
      - backend
      - frontend
    volumes:
      - ./nginx/default.prod.ssl.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    ports:
      - "8080:80"
      - "8443:443"
