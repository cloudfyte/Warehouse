map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# Use Docker's internal resolver so backend/frontend IPs are re-resolved on every
# request instead of being cached for the life of the nginx worker — otherwise a
# backend/frontend redeploy (new container IP) 502s until nginx is reloaded too.
resolver 127.0.0.11 valid=10s ipv6=off;

server {
    listen 80;
    server_name sri-warehouse.hms.rest;
    return 301 https://$host:8443$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name sri-warehouse.hms.rest;
    client_max_body_size 25m;

    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;

    location /graphql/ {
        set $backend_upstream http://backend:8000;
        proxy_pass $backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location / {
        set $frontend_upstream http://frontend:3000;
        proxy_pass $frontend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_connect_timeout 75s;
        proxy_read_timeout    300s;
        proxy_send_timeout    300s;
    }
}
